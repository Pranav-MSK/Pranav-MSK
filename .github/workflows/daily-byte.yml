name: Update Daily Byte

on:
  schedule:
    - cron: "0 6 * * *"  # runs daily
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Run script
        run: python update_fun_fact.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md fact_index.txt
          git commit -m "Update Daily Byte" || exit 0
          git push
